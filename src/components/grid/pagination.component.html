<nav class="sticky top-24 z-10 mb-3">
  <ol class="flex justify-center" aria-label="Pagination">
    <li>
      <button
        [attr.aria-label]="translations.first()"
        [class]="classesFirst"
        (click)="changePage(1)"
        [disabled]="currentPage() <= 1"
        type="button"
      >
        <fa-icon [icon]="icons.first" />
      </button>
    </li>
    <li>
      <button
        [attr.aria-label]="translations.previous()"
        [class]="classesPreviousNext"
        (click)="changePage(currentPage() - 1)"
        [disabled]="currentPage() <= 1"
        type="button"
      >
        <fa-icon [icon]="icons.previous" />
      </button>
    </li>
    @for (page of pages(); track $index) {
      <li>
        <button
          [attr.aria-current]="page.current"
          [attr.aria-label]="page.label"
          [class]="page.classes"
          (click)="changePage(page.value)"
          type="button"
        >
          {{ page.value }}
        </button>
      </li>
    }
    <li>
      <button
        [attr.aria-label]="translations.next()"
        [class]="classesPreviousNext"
        (click)="changePage(currentPage() + 1)"
        [disabled]="currentPage() + 1 > totalPages()"
        type="button"
      >
        <fa-icon [icon]="icons.next" />
      </button>
    </li>
    <li>
      <button
        [attr.aria-label]="translations.last()"
        [class]="classesLast"
        (click)="changePage(totalPages())"
        [disabled]="currentPage() + 1 > totalPages()"
        type="button"
      >
        <fa-icon [icon]="icons.last" />
      </button>
    </li>
  </ol>
</nav>
